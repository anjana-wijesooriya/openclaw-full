name: Build and push Docker image

on:
    push:
        branches: ["main"]
    workflow_dispatch:

env:
    IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
    build-amd64:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set image name
              run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push amd64 image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  platforms: linux/amd64
                  tags: |
                      ${{ env.IMAGE_NAME }}:amd64-${{ github.sha }}

    build-arm64:
        runs-on: ubuntu-24.04-arm
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set image name
              run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push arm64 image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  platforms: linux/arm64
                  tags: |
                      ${{ env.IMAGE_NAME }}:arm64-${{ github.sha }}

    manifest:
        runs-on: ubuntu-latest
        needs:
            - build-amd64
            - build-arm64
        permissions:
            contents: read
            packages: write

        steps:
            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set image name
              run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

            - name: Create and push multi-arch manifest
              run: |
                  docker buildx imagetools create \
                    -t $IMAGE_NAME:latest \
                    -t $IMAGE_NAME:${GITHUB_SHA} \
                    $IMAGE_NAME:amd64-${GITHUB_SHA} \
                    $IMAGE_NAME:arm64-${GITHUB_SHA}

            - name: Inspect manifest
              run: |
                  docker buildx imagetools inspect $IMAGE_NAME:${GITHUB_SHA}
